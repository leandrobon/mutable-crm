services:
  db:
    image: postgres:16-alpine
    container_name: mutable-crm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mutable-crm
      POSTGRES_PASSWORD: mutable-crm
      POSTGRES_DB: mutable-crm
    ports:
      - "5433:5432"
    volumes:
      - mutable-crm-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mutable-crm -d mutable-crm"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mutable-crm-data:

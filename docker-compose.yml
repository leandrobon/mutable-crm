services:
  db:
    image: postgres:16-alpine
    container_name: crmllm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: crmllm
      POSTGRES_PASSWORD: crmllm
      POSTGRES_DB: crmllm
    ports:
      - "5433:5432"
    volumes:
      - crmllm-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crmllm -d crmllm"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  crmllm-data:
